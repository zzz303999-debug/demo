spring:
  application:
    name: bookstore-ddd

  # PostgreSQL 配置
  datasource:
    url: jdbc:postgresql://localhost:5432/bookstore
    username: zhangjiajun
    password:
    driver-class-name: org.postgresql.Driver

  # JPA 配置
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    open-in-view: false

  # Flyway 配置
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    schemas: public
    out-of-order: false

# 服务器端口
server:
  port: 8080